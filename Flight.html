<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlightLog">
<meta name="theme-color" content="#06090f">
<title>FlightLog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
:root{--bg:#06090f;--bg2:#0d1220;--bg3:rgba(255,255,255,0.04);--bdr:rgba(255,255,255,0.09);--txt:#dce4f0;--txt2:rgba(255,255,255,0.45);--txt3:rgba(255,255,255,0.25);--or:#f97316;--or2:rgba(249,115,22,0.15);--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;--r:12px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--sans)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{padding:calc(var(--st) + 14px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0}
#nav{display:flex;background:var(--bg);border-top:1px solid var(--bdr);padding-bottom:var(--sb);flex-shrink:0}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.hrow{display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--or);letter-spacing:3px}
.brand-sub{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:2px;margin-top:2px}
.stats-row{display:flex;margin-top:12px;background:var(--bg3);border-radius:10px;overflow:hidden}
.stat-i{flex:1;text-align:center;padding:9px 4px;border-right:1px solid var(--bdr)}
.stat-i:last-child{border-right:none}
.stat-v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--or)}
.stat-l{font-size:9px;color:var(--txt3);letter-spacing:1px;margin-top:1px}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--txt3);font-size:9px;letter-spacing:1px;font-family:var(--mono);gap:4px;transition:color 0.2s}
.ntab.active{color:var(--or)}
.ni{font-size:20px;line-height:1}
.page{padding:16px;padding-bottom:20px;display:none}
.page.active{display:block}
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.card-h{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.cbar{width:4px;border-radius:2px;flex-shrink:0}
.field{margin-bottom:12px}
.fl{font-family:var(--mono);font-size:9px;letter-spacing:1.8px;color:var(--txt3);margin-bottom:5px;text-transform:uppercase}
.inp,select.inp{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--txt);padding:11px 12px;font-size:14px;width:100%;outline:none;font-family:var(--sans);appearance:none;-webkit-appearance:none}
.inp:focus{border-color:rgba(249,115,22,0.6);box-shadow:0 0 0 2px rgba(249,115,22,0.12)}
input[type=date].inp::-webkit-calendar-picker-indicator,input[type=time].inp::-webkit-calendar-picker-indicator{filter:invert(0.4) sepia(1) hue-rotate(160deg)}
.inp-mono{font-family:var(--mono);color:var(--or);font-weight:700}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:var(--mono);font-weight:700;letter-spacing:1px;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-p{background:linear-gradient(135deg,#f97316,#dc5a0a);color:white;padding:13px 20px;font-size:13px;width:100%;margin-top:8px}
.btn-p:active{transform:scale(0.98)}
.btn-g{background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.15);color:var(--txt3);padding:11px;font-size:11px;width:100%;margin-top:6px}
.btn-sm{padding:5px 10px;font-size:10px;border-radius:6px}
.btn-ol{background:none;border:1px solid rgba(255,255,255,0.12);color:var(--txt2)}
.btn-del{background:none;border:1px solid rgba(239,68,68,0.25);color:rgba(239,68,68,0.5)}
.btn-or{background:rgba(249,115,22,0.8);color:white;padding:10px 16px;font-size:13px;border-radius:8px}
.leg-row{padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:10px;align-items:flex-start}
.leg-code{font-family:var(--mono);font-weight:700;font-size:15px}
.chip{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,0.06);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--txt2);margin:2px 2px 0 0}
.chip-or{color:var(--or);background:var(--or2)}
.erow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;flex-direction:column}
.modal-box{background:#0d1220;border-top:1px solid var(--bdr);border-radius:20px 20px 0 0;margin-top:auto;max-height:82vh;display:flex;flex-direction:column;padding-bottom:var(--sb)}
.modal-hdl{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 6px}
.modal-srch{padding:8px 14px 10px;border-bottom:1px solid var(--bdr)}
.modal-srch input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:14px;width:100%;outline:none}
.modal-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.msec{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--txt3);padding:8px 16px 3px;background:rgba(255,255,255,0.02);text-transform:uppercase;position:sticky;top:0;z-index:1}
.mrow{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer}
.mrow:active{background:rgba(249,115,22,0.1)}
.mcode{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--or)}
.mcity{font-size:13px;color:var(--txt2);margin-left:8px}
.mname{font-size:10px;color:var(--txt3);text-align:right;max-width:120px}
#toast{position:fixed;bottom:calc(var(--sb) + 70px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(249,115,22,0.92);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.stitle{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--txt3);margin-bottom:10px;text-transform:uppercase}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.eadd{background:rgba(255,255,255,0.03);border-radius:8px;padding:12px;margin-bottom:10px}
.delconf{display:flex;gap:8px;align-items:center;padding:10px 14px;background:rgba(239,68,68,0.08);border-top:1px solid rgba(239,68,68,0.15)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.25);border-radius:2px}
.tab-row{display:flex;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:14px;overflow:hidden}
.tab-btn{flex:1;padding:9px 6px;background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;font-family:var(--mono);letter-spacing:1px;transition:all 0.2s}
.tab-btn.active{background:rgba(249,115,22,0.2);color:var(--or)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hrow">
      <div><div class="brand">✈ FLIGHT LOG</div><div class="brand-sub">飛行旅程記錄儀</div></div>
      <button class="btn btn-sm btn-ol" onclick="exportPDF()" style="font-size:11px;padding:7px 11px">📄 PDF</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>
  <div id="content">
    <div class="page active" id="page-map">
      <div id="map-wrap" style="border-radius:12px;overflow:hidden;border:1px solid var(--bdr)">
        <svg id="fmap" viewBox="0 0 700 350" style="width:100%;display:block;background:linear-gradient(180deg,#08101e,#0b1628)"></svg>
        <div id="map-leg" style="padding:10px 14px;background:rgba(0,0,0,0.3);display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--bdr)"></div>
      </div>
    </div>
    <div class="page" id="page-trips"><div id="trips-list"></div></div>
    <div class="page" id="page-add">
      <div class="stitle">// 行程資訊</div>
      <div class="field"><div class="fl">行程名稱</div><input class="inp" id="f-name" placeholder="例：新加坡五月之旅"></div>
      <div class="field"><div class="fl">備註（選填）</div><input class="inp" id="f-note" placeholder="旅行目的、紀念..."></div>
      <div class="stitle" style="margin-top:18px">// 航段記錄</div>
      <div id="legs-c"></div>
      <button class="btn btn-g" onclick="addLeg()">＋ 新增回程 / 轉機段</button>
      <button class="btn btn-p" onclick="saveTrip()">儲存行程 ✈</button>
    </div>
  </div>
  <div id="nav">
    <button class="ntab active" id="nav-map" onclick="switchTab('map')"><span class="ni">🗺</span><span>地圖</span></button>
    <button class="ntab" id="nav-trips" onclick="switchTab('trips')"><span class="ni">📋</span><span>行程</span></button>
    <button class="ntab" id="nav-add" onclick="switchTab('add')"><span class="ni">＋</span><span>新增</span></button>
  </div>
</div>

<div id="ap-modal" class="modal-ov" style="display:none" onclick="closeAP(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdl"></div>
    <div class="modal-srch"><input id="ap-s" placeholder="搜尋城市、機場名稱或 IATA 代碼..." oninput="renderAPList()" autocomplete="off" autocorrect="off" autocapitalize="characters"></div>
    <div class="modal-list" id="ap-list"></div>
    <div style="margin:10px 16px"><button class="btn btn-ol" style="width:100%;padding:11px;font-size:12px" onclick="closeAP()">取消</button></div>
  </div>
</div>
<div id="toast"></div>

function gc(la1,lo1,la2,lo2){var n=55,r=function(d){return d*Math.PI/180;},d=function(v){return v*180/Math.PI;};var p1=r(la1),l1=r(lo1),p2=r(la2),l2=r(lo2);var dd=2*Math.asin(Math.sqrt(Math.pow(Math.sin((p2-p1)/2),2)+Math.cos(p1)*Math.cos(p2)*Math.pow(Math.sin((l2-l1)/2),2)));if(dd===0)return[[la1,lo1]];var pts=[];for(var i=0;i<=n;i++){var f=i/n,A=Math.sin((1-f)*dd)/Math.sin(dd),B=Math.sin(f*dd)/Math.sin(dd);var x=A*Math.cos(p1)*Math.cos(l1)+B*Math.cos(p2)*Math.cos(l2);var y=A*Math.cos(p1)*Math.sin(l1)+B*Math.cos(p2)*Math.sin(l2);var z=A*Math.sin(p1)+B*Math.sin(p2);pts.push([d(Math.atan2(z,Math.sqrt(x*x+y*y))),d(Math.atan2(y,x))]);}return pts;}
function dist(la1,lo1,la2,lo2){var r=function(d){return d*Math.PI/180;},R=6371;var a=Math.pow(Math.sin(r(la2-la1)/2),2)+Math.cos(r(la1))*Math.cos(r(la2))*Math.pow(Math.sin(r(lo2-lo1)/2),2);return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));}
function proj(lat,lng){var x=((lng+180)/360)*W;var y=(1-Math.log(Math.tan(lat*Math.PI/360+Math.PI/4))/Math.PI)/2*H;return[x,Math.max(0,Math.min(H,y))];}
function alName(fn){if(!fn)return"";var u=fn.toUpperCase().trim();return AL[u.slice(0,2)]||AL[u.slice(0,3)]||AL[u.slice(0,1)]||"";}
function toTWD(amt,cur){return Math.round(amt*(rates[cur]||SR[cur]||1));}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cStats(){var km=0,legs=0,exp=0,ci=[],co=[];trips.forEach(function(t){(t.legs||[]).forEach(function(l){legs++;var la=apLa(l.from),lo=apLo(l.from),la2=apLa(l.to),lo2=apLo(l.to);if(la&&la2)km+=dist(la,lo,la2,lo2);var c1=apC(l.from),c2=apC(l.to);if(c1&&ci.indexOf(c1)<0)ci.push(c1);if(c2&&ci.indexOf(c2)<0)ci.push(c2);var a=AIRPORTS[l.from],b=AIRPORTS[l.to];if(a&&co.indexOf(a[2])<0)co.push(a[2]);if(b&&co.indexOf(b[2])<0)co.push(b[2]);});(t.expenses||[]).forEach(function(e){exp+=(e.twd||0);});});return{km:km,legs:legs,exp:exp,ci:ci,co:co};}
function renderStats(){var s=cStats();var ks=s.km>=1000?(s.km/1000).toFixed(1)+'k':s.km;var es='NT$'+(s.exp>=1000?(s.exp/1000).toFixed(0)+'k':s.exp);document.getElementById('stats-row').innerHTML=[{v:trips.length,l:'行程'},{v:s.legs,l:'航班'},{v:ks,l:'公里'},{v:s.ci.length,l:'城市'},{v:es,l:'開支'}].map(function(x){return'<div class="stat-i"><div class="stat-v">'+x.v+'</div><div class="stat-l">'+x.l+'</div></div>';}).join('');}

function updFN(id,val){var u=val.toUpperCase(),a=alName(u);formLegs=formLegs.map(function(l){if(l.id!==id)return l;return Object.assign({},l,{flightNo:u,airline:a,fi:null,busy:false});});renderLegs();clearTimeout(fnDeb[id]);if(u.length>=4){formLegs=formLegs.map(function(l){return l.id===id?Object.assign({},l,{busy:true}):l;});renderLegs();var leg=formLegs.find(function(l){return l.id===id;});fnDeb[id]=setTimeout(async function(){var info=await aiLook({mode:'fn',fn:u,date:leg?leg.date:'',from:leg?leg.from:'',to:leg?leg.to:''});formLegs=formLegs.map(function(l){if(l.id!==id)return l;var upd=Object.assign({},l,{busy:false});if(info&&info.found){upd.airline=info.airline||a;upd.fi={dep:info.departure,arr:info.arrival,ac:info.aircraft,dur:info.duration};if(info.from&&AIRPORTS[info.from])upd.from=info.from;if(info.to&&AIRPORTS[info.to])upd.to=info.to;}return upd;});renderLegs();},1200);}}
function updTime(id,field,val){formLegs=formLegs.map(function(l){if(l.id!==id)return l;var fi=Object.assign({},l.fi||{});fi[field]=val;return Object.assign({},l,{fi:fi});});clearTimeout(tmDeb[id]);var leg=formLegs.find(function(l){return l.id===id;});if(leg&&leg.fi&&leg.fi.dep&&leg.from&&leg.to){formLegs=formLegs.map(function(l){return l.id===id?Object.assign({},l,{busy:true}):l;});renderLegs();tmDeb[id]=setTimeout(async function(){var info=await aiLook({mode:'time',dep:leg.fi.dep,arr:leg.fi.arr||'',date:leg.date,from:leg.from,to:leg.to});formLegs=formLegs.map(function(l){if(l.id!==id)return l;var upd=Object.assign({},l,{busy:false});if(info&&info.found){if(info.flightNo)upd.flightNo=info.flightNo;upd.airline=info.airline||upd.airline||alName(info.flightNo||'');var fi=Object.assign({},upd.fi||{});if(info.aircraft)fi.ac=info.aircraft;if(info.duration)fi.dur=info.duration;if(info.departure)fi.dep=info.departure;if(info.arrival)fi.arr=info.arrival;upd.fi=fi;}return upd;});renderLegs();},1500);}else{renderLegs();}}
async function aiLook(p){var prompt=p.mode==='fn'?('班機號碼：'+p.fn+(p.date?' 日期：'+p.date:'')+(p.from?' 出發：'+p.from:'')+(p.to?' 到：'+p.to:'')):('出發：'+p.from+' 目的地：'+p.to+' 起飛：'+p.dep+(p.arr?' 降落：'+p.arr:'')+(p.date?' 日期：'+p.date:''));try{var res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:'航班資訊助理。只回傳JSON：{"flightNo":"","airline":"","from":"IATA","to":"IATA","departure":"HH:MM","arrival":"HH:MM","aircraft":"","duration":"Xh Ym","found":true}。無法確定found為false。',messages:[{role:"user",content:prompt}]})});var data=await res.json();var txt=(data.content&&data.content[0]&&data.content[0].text)||'';return JSON.parse(txt.replace(/```json|```/g,'').trim());}catch(e){return null;}}
