<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlightLog">
<meta name="theme-color" content="#06090f">
<title>FlightLog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
:root{--bg:#06090f;--bg3:rgba(255,255,255,0.04);--bdr:rgba(255,255,255,0.09);--txt:#dce4f0;--txt2:rgba(255,255,255,0.45);--txt3:rgba(255,255,255,0.25);--or:#f97316;--or2:rgba(249,115,22,0.15);--mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--sans)}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{padding:calc(var(--st) + 14px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0}
#nav{display:flex;background:var(--bg);border-top:1px solid var(--bdr);padding-bottom:var(--sb);flex-shrink:0}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hrow{display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--or);letter-spacing:3px}
.brand-sub{font-family:var(--mono);font-size:9px;color:var(--txt3);letter-spacing:2px;margin-top:2px}
.stats-row{display:flex;margin-top:12px;background:var(--bg3);border-radius:10px;overflow:hidden}
.stat-i{flex:1;text-align:center;padding:9px 4px;border-right:1px solid var(--bdr)}
.stat-i:last-child{border-right:none}
.stat-v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--or)}
.stat-l{font-size:9px;color:var(--txt3);letter-spacing:1px;margin-top:1px}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:none;color:var(--txt3);font-size:9px;font-family:var(--mono);gap:4px;cursor:pointer}
.ntab.active{color:var(--or)}
.ni{font-size:20px;line-height:1}
.page{padding:16px;display:none}
.page.active{display:block}
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-h{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px}
.cbar{width:4px;border-radius:2px;flex-shrink:0}
.field{margin-bottom:12px}
.fl{font-family:var(--mono);font-size:9px;letter-spacing:1.8px;color:var(--txt3);margin-bottom:5px;text-transform:uppercase;display:block}
.inp{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--txt);padding:11px 12px;font-size:14px;width:100%;outline:none;font-family:var(--sans);-webkit-appearance:none;display:block}
.inp:focus{border-color:rgba(249,115,22,0.6)}
input[type=date].inp::-webkit-calendar-picker-indicator,input[type=time].inp::-webkit-calendar-picker-indicator{filter:invert(0.4) sepia(1) hue-rotate(160deg)}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:var(--mono);font-weight:700;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center}
.btn-p{background:linear-gradient(135deg,#f97316,#dc5a0a);color:white;padding:13px 20px;font-size:13px;width:100%;margin-top:8px}
.btn-g{background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.15);color:var(--txt3);padding:11px;font-size:11px;width:100%;margin-top:6px}
.btn-sm{padding:5px 10px;font-size:10px;border-radius:6px}
.btn-ol{background:none;border:1px solid rgba(255,255,255,0.12);color:var(--txt2)}
.btn-del{background:none;border:1px solid rgba(239,68,68,0.25);color:rgba(239,68,68,0.5)}
.btn-or{background:rgba(249,115,22,0.8);color:white;padding:10px 16px;font-size:13px;border-radius:8px}
.leg-row{padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:10px}
.leg-code{font-family:var(--mono);font-weight:700;font-size:15px}
.chip{display:inline-flex;align-items:center;background:rgba(255,255,255,0.06);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--txt2);margin:2px 2px 0 0}
.chip-or{color:var(--or);background:var(--or2)}
.erow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;flex-direction:column}
.modal-box{background:#0d1220;border-radius:20px 20px 0 0;margin-top:auto;max-height:82vh;display:flex;flex-direction:column;padding-bottom:var(--sb)}
.modal-hdl{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:10px auto 6px}
.modal-srch{padding:8px 14px 10px;border-bottom:1px solid var(--bdr)}
.modal-srch input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:14px;width:100%;outline:none}
.modal-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.msec{font-family:var(--mono);font-size:9px;color:var(--txt3);padding:8px 16px 3px;background:rgba(255,255,255,0.02);text-transform:uppercase;position:sticky;top:0}
.mrow{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.mcode{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--or)}
.mcity{font-size:13px;color:var(--txt2);margin-left:8px}
.mname{font-size:10px;color:var(--txt3);text-align:right;max-width:120px}
#toast{position:fixed;bottom:calc(var(--sb) + 70px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(249,115,22,0.92);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.stitle{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--txt3);margin-bottom:10px;text-transform:uppercase}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.eadd{background:rgba(255,255,255,0.03);border-radius:8px;padding:12px;margin-bottom:10px}
.delconf{display:flex;gap:8px;align-items:center;padding:10px 14px;background:rgba(239,68,68,0.08);border-top:1px solid rgba(239,68,68,0.15)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.25);border-radius:2px}
.tab-row{display:flex;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:14px;overflow:hidden}
.tab-btn{flex:1;padding:9px 4px;background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;font-family:var(--mono)}
.tab-btn.active{background:rgba(249,115,22,0.2);color:var(--or)}
select.inp{cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hrow">
      <div><div class="brand">✈ FLIGHT LOG</div><div class="brand-sub">飛行旅程記錄儀</div></div>
      <button class="btn btn-sm btn-ol" id="pdf-btn" style="font-size:11px;padding:7px 11px">📄 PDF</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
  </div>
  <div id="content">
    <div class="page active" id="page-map">
      <div style="border-radius:12px;overflow:hidden;border:1px solid var(--bdr)">
        <svg id="fmap" viewBox="0 0 700 350" style="width:100%;display:block;background:linear-gradient(180deg,#08101e,#0b1628)"></svg>
        <div id="map-leg" style="padding:10px 14px;background:rgba(0,0,0,0.3);display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--bdr);min-height:38px"></div>
      </div>
    </div>
    <div class="page" id="page-trips"><div id="trips-list"></div></div>
    <div class="page" id="page-add">
      <div class="stitle">// 行程資訊</div>
      <div class="field"><label class="fl">行程名稱</label><input class="inp" id="f-name" placeholder="例：新加坡五月之旅" type="text"></div>
      <div class="field"><label class="fl">備註（選填）</label><input class="inp" id="f-note" placeholder="旅行目的..." type="text"></div>
      <div class="stitle" style="margin-top:18px">// 航段記錄</div>
      <div id="legs-c"></div>
      <button class="btn btn-g" id="add-leg-btn">＋ 新增回程 / 轉機段</button>
      <button class="btn btn-p" id="save-btn">儲存行程 ✈</button>
    </div>
  </div>
  <div id="nav">
    <button class="ntab active" id="nav-map"><span class="ni">🗺</span><span>地圖</span></button>
    <button class="ntab" id="nav-trips"><span class="ni">📋</span><span>行程</span></button>
    <button class="ntab" id="nav-add"><span class="ni">＋</span><span>新增</span></button>
  </div>
</div>
<div id="ap-modal" class="modal-ov" style="display:none">
  <div class="modal-box">
    <div class="modal-hdl"></div>
    <div class="modal-srch"><input id="ap-s" placeholder="搜尋城市或 IATA 代碼..." type="text" autocomplete="off" autocorrect="off" autocapitalize="characters"></div>
    <div class="modal-list" id="ap-list"></div>
    <div style="margin:10px 16px"><button class="btn btn-ol" id="ap-cancel" style="width:100%;padding:11px;font-size:12px">取消</button></div>
  </div>
</div>
<div id="toast"></div>

function gc(la1,lo1,la2,lo2) {
  var n=55, pts=[], i, f, A, B, x, y, z, dd;
  var toR = function(d){return d*Math.PI/180;};
  var toD = function(v){return v*180/Math.PI;};
  var p1=toR(la1),l1=toR(lo1),p2=toR(la2),l2=toR(lo2);
  var sh = Math.sin((p2-p1)/2), sl = Math.sin((l2-l1)/2);
  dd = 2*Math.asin(Math.sqrt(sh*sh + Math.cos(p1)*Math.cos(p2)*sl*sl));
  if (dd===0) return [[la1,lo1]];
  for (i=0; i<=n; i++) {
    f=i/n; A=Math.sin((1-f)*dd)/Math.sin(dd); B=Math.sin(f*dd)/Math.sin(dd);
    x=A*Math.cos(p1)*Math.cos(l1)+B*Math.cos(p2)*Math.cos(l2);
    y=A*Math.cos(p1)*Math.sin(l1)+B*Math.cos(p2)*Math.sin(l2);
    z=A*Math.sin(p1)+B*Math.sin(p2);
    pts.push([toD(Math.atan2(z,Math.sqrt(x*x+y*y))), toD(Math.atan2(y,x))]);
  }
  return pts;
}

function dist(la1,lo1,la2,lo2) {
  var toR=function(d){return d*Math.PI/180;}, R=6371;
  var sa=Math.sin(toR(la2-la1)/2), sb=Math.sin(toR(lo2-lo1)/2);
  var aa=sa*sa+Math.cos(toR(la1))*Math.cos(toR(la2))*sb*sb;
  return Math.round(R*2*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa)));
}

function proj(lat,lng) {
  var x=((lng+180)/360)*W;
  var y=(1-Math.log(Math.tan(lat*Math.PI/360+Math.PI/4))/Math.PI)/2*H;
  return [x, Math.max(0,Math.min(H,y))];
}

function cStats() {
  var km=0,legs=0,exp=0,ci=[],co=[];
  var t, l, a, b;
  for (var ti=0; ti<trips.length; ti++) {
    t = trips[ti];
    for (var li=0; li<(t.legs||[]).length; li++) {
      l = t.legs[li]; legs++;
      a = AIRPORTS[l.from]; b = AIRPORTS[l.to];
      if (a&&b) km+=dist(a.la,a.lo,b.la,b.lo);
      if (a&&ci.indexOf(a.c)<0) ci.push(a.c);
      if (b&&ci.indexOf(b.c)<0) ci.push(b.c);
    }
    for (var ei=0; ei<(t.exp||[]).length; ei++) exp+=(t.exp[ei].twd||0);
  }
  return {km:km,legs:legs,exp:exp,ci:ci};
}

function doAddExp(tid){
  var cat=document.getElementById('ec-'+tid).value;
  var desc=(document.getElementById('ed-'+tid).value||'').trim();
  var amt=parseFloat(document.getElementById('ea-'+tid).value||'0');
  var cur=document.getElementById('ecu-'+tid).value;
  if(!amt||amt<=0){toast('請輸入金額');return;}
  var t=null; for(var i=0;i<trips.length;i++){if(trips[i].id===tid){t=trips[i];break;}}
  if(!t) return;
  if(!t.exp) t.exp=[];
  t.exp.push({id:Date.now(),cat:cat,desc:desc,amt:amt,cur:cur,twd:toTWD(amt,cur)});
  save(); renderTrips(); renderStats();
}

function doDelExp(tid,eid){
  var t=null; for(var i=0;i<trips.length;i++){if(trips[i].id===tid){t=trips[i];break;}}
  if(!t) return;
  t.exp=(t.exp||[]).filter(function(e){return e.id!==eid;});
  save(); renderTrips(); renderStats();
}

function setLegMode(lid, mode){
  for(var i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){formLegsData[i].mode=mode;break;}}
  renderLegs();
}

function updLegField(lid,field,val){
  for(var i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){formLegsData[i][field]=val;break;}}
}

var fnDebs={};
function updFN(lid,val){
  var u=val.toUpperCase(), a=alName(u), i;
  for(i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){formLegsData[i].fn=u;formLegsData[i].al=a;formLegsData[i].fi=null;formLegsData[i].busy=false;break;}}
  renderLegs();
  clearTimeout(fnDebs[lid]);
  if(u.length>=4){
    var leg=null; for(i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){leg=formLegsData[i];break;}}
    for(i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){formLegsData[i].busy=true;break;}}
    renderLegs();
    fnDebs[lid]=setTimeout(function(){
      aiLook({mode:'fn',fn:u,date:leg?leg.date:'',from:leg?leg.from:'',to:leg?leg.to:''}).then(function(info){
        for(var j=0;j<formLegsData.length;j++){
          if(formLegsData[j].id===lid){
            formLegsData[j].busy=false;
            if(info&&info.found){
              formLegsData[j].al=info.airline||a;
              formLegsData[j].fi={dep:info.departure||'',arr:info.arrival||'',ac:info.aircraft||'',dur:info.duration||''};
              if(info.from&&AIRPORTS[info.from]) formLegsData[j].from=info.from;
              if(info.to&&AIRPORTS[info.to]) formLegsData[j].to=info.to;
            }
            break;
          }
        }
        renderLegs();
      });
    }, 1200);
  }
}

var tmDebs={};
function updTime(lid,field,val){
  var i, leg=null;
  for(i=0;i<formLegsData.length;i++){
    if(formLegsData[i].id===lid){
      if(!formLegsData[i].fi) formLegsData[i].fi={};
      formLegsData[i].fi[field]=val;
      leg=formLegsData[i]; break;
    }
  }
  clearTimeout(tmDebs[lid]);
  if(leg&&leg.fi&&leg.fi.dep&&leg.from&&leg.to){
    for(i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){formLegsData[i].busy=true;break;}}
    renderLegs();
    var capLeg=leg;
    tmDebs[lid]=setTimeout(function(){
      aiLook({mode:'time',dep:capLeg.fi.dep,arr:capLeg.fi.arr||'',date:capLeg.date,from:capLeg.from,to:capLeg.to}).then(function(info){
        for(var j=0;j<formLegsData.length;j++){
          if(formLegsData[j].id===lid){
            formLegsData[j].busy=false;
            if(info&&info.found){
              if(info.flightNo) formLegsData[j].fn=info.flightNo;
              formLegsData[j].al=info.airline||formLegsData[j].al||alName(info.flightNo||'');
              if(!formLegsData[j].fi) formLegsData[j].fi={};
              if(info.aircraft) formLegsData[j].fi.ac=info.aircraft;
              if(info.duration) formLegsData[j].fi.dur=info.duration;
              if(info.departure) formLegsData[j].fi.dep=info.departure;
              if(info.arrival) formLegsData[j].fi.arr=info.arrival;
            }
            break;
          }
        }
        renderLegs();
      });
    }, 1500);
  } else { renderLegs(); }
}

function aiLook(p) {
  var prompt = p.mode==='fn'
    ? '班機號碼：'+p.fn+(p.date?' 日期：'+p.date:'')+(p.from?' 出發：'+p.from:'')+(p.to?' 到：'+p.to:'')
    : '出發：'+p.from+' 目的地：'+p.to+' 起飛：'+p.dep+(p.arr?' 降落：'+p.arr:'')+(p.date?' 日期：'+p.date:'');
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,
      system:'航班資訊助理。只回傳JSON：{"flightNo":"","airline":"","from":"IATA","to":"IATA","departure":"HH:MM","arrival":"HH:MM","aircraft":"","duration":"Xh Ym","found":true}。無法確定found為false。',
      messages:[{role:"user",content:prompt}]})
  }).then(function(res){return res.json();}).then(function(data){
    var txt=(data.content&&data.content[0]&&data.content[0].text)||'';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
  }).catch(function(){return null;});
}

function openAPicker(lid,field){
  apCB=function(code){
    for(var i=0;i<formLegsData.length;i++){if(formLegsData[i].id===lid){formLegsData[i][field]=code;break;}}
    renderLegs();
  };
  document.getElementById('ap-s').value='';
  renderAPList();
  document.getElementById('ap-modal').style.display='flex';
  setTimeout(function(){document.getElementById('ap-s').focus();},300);
}

function renderAPList(){
  var q=(document.getElementById('ap-s').value||'').trim();
  var el=document.getElementById('ap-list');
  var html='', code, ap, qu, hits, g, codes, i;
  if(q.length>=1){
    qu=q.toUpperCase(); hits=[];
    for(code in AIRPORTS){
      ap=AIRPORTS[code];
      if(code.indexOf(qu)>=0||ap.c.indexOf(q)>=0||ap.n.indexOf(q)>=0){hits.push([code,ap]);}
    }
    hits=hits.slice(0,20);
    if(hits.length){
      for(i=0;i<hits.length;i++){
        html+='<div class="mrow ap-sel" data-code="'+hits[i][0]+'" style="cursor:pointer">';
        html+='<div><span class="mcode">'+hits[i][0]+'</span><span class="mcity">'+hits[i][1].c+'</span></div>';
        html+='<span class="mname">'+hits[i][1].n+'</span></div>';
      }
    } else { html='<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.25);font-size:13px">無結果</div>'; }
  } else {
    for(g in AP_GROUPS){
      html+='<div class="msec">'+g+'</div>';
      codes=AP_GROUPS[g];
      for(i=0;i<codes.length;i++){
        ap=AIRPORTS[codes[i]];
        html+='<div class="mrow ap-sel" data-code="'+codes[i]+'" style="cursor:pointer;padding-left:16px">';
        html+='<div><span class="mcode">'+codes[i]+'</span><span class="mcity">'+ap.c+'</span></div>';
        html+='<span class="mname">'+ap.n+'</span></div>';
      }
    }
  }
  el.innerHTML=html;
  el.onclick=function(ev){
    var row=ev.target.closest('.ap-sel');
    if(!row) return;
    var code=row.getAttribute('data-code');
    if(apCB) apCB(code);
    document.getElementById('ap-modal').style.display='none';
    apCB=null;
  };
}

function rmLeg(lid){
  formLegsData=formLegsData.filter(function(l){return l.id!==lid;});
  renderLegs();
}

function saveTrip(){
  var name=(document.getElementById('f-name').value||'').trim();
  var note=(document.getElementById('f-note').value||'').trim();
  var valid=[], i, l;
  for(i=0;i<formLegsData.length;i++){l=formLegsData[i];if(l.from&&l.to)valid.push({id:l.id,date:l.date,from:l.from,to:l.to,fn:l.fn,al:l.al,fi:l.fi});}
  if(!valid.length){toast('請至少填寫出發與抵達地點');return;}
  trips.push({id:Date.now(),name:name||('行程 '+(trips.length+1)),note:note,legs:valid,exp:[]});
  save();
  document.getElementById('f-name').value='';
  document.getElementById('f-note').value='';
  formLegsData=[mkLeg()];
  renderStats(); toast('行程已儲存！'); switchTab('trips');
}
